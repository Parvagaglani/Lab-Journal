name: Daily Experiment Publisher

on:
  schedule:
    - cron: '0 14 * * *'

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone Storage Repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Parvagaglani/college-experiments-storage.git

      - name: Run Publisher
        run: python publisher.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Daily experiment publish" || exit 0

          git push
